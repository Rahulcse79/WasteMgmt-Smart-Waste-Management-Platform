apiVersion: apps/v1
kind: Deployment
metadata:
  name: wastemgmt-api
  labels: { app: wastemgmt-api }
spec:
  replicas: 3
  selector: { matchLabels: { app: wastemgmt-api } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata: { labels: { app: wastemgmt-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/wastemgmt-api:latest
          ports: [{ containerPort: 3023 }]
          envFrom:
            - secretRef: { name: wastemgmt-api-env }
          readinessProbe:
            httpGet: { path: /health/ready, port: 3023 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3023 }
            periodSeconds: 30
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: wastemgmt-api }
spec:
  selector: { app: wastemgmt-api }
  ports:
    - { name: http, port: 80, targetPort: 3023 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: wastemgmt-api }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wastemgmt-api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
