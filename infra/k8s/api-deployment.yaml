apiVersion: apps/v1
kind: Deployment
metadata:
  name: wastemgmt-api
  labels: { app: wastemgmt-api }
spec:
  replicas: 3
  selector: { matchLabels: { app: wastemgmt-api } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata: { labels: { app: wastemgmt-api } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/your-org/wastemgmt-api:latest
          ports: [{ containerPort: 3023 }]
          envFrom:
            - secretRef: { name: wastemgmt-api-env }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /health/ready, port: 3023 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3023 }
            periodSeconds: 30
          resources:
            # WS-heavy: bump memory floor; prediction/analytics aggregations need headroom.
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "1500m", memory: "1536Mi" }
          volumeMounts:
            - { name: tmp,  mountPath: /tmp }
            - { name: logs, mountPath: /app/logs }
      volumes:
        - { name: tmp,  emptyDir: {} }
        - { name: logs, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: wastemgmt-api }
spec:
  selector: { app: wastemgmt-api }
  ports:
    - { name: http, port: 80, targetPort: 3023 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: wastemgmt-api }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wastemgmt-api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    # WebSocket fan-out and Mongoose document caches make memory the more
    # honest scaling signal under sustained load. Keep both metrics: HPA
    # scales on whichever requests more replicas.
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 75 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - { type: Percent, value: 25, periodSeconds: 60 }
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - { type: Percent, value: 100, periodSeconds: 30 }
        - { type: Pods,    value: 4,   periodSeconds: 30 }
      selectPolicy: Max
