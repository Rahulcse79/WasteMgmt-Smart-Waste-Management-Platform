version: "3.9"

services:
  api:
    build:
      context: ../wastemgmt_api
      dockerfile: Dockerfile
    image: wastemgmt-api:latest
    container_name: wastemgmt-api
    restart: unless-stopped
    env_file:
      - ../wastemgmt_api/.env
    ports:
      - "3023:3023"
    volumes:
      # Mount MQTT TLS material into the container (read-only). Adjust paths to host.
      - /etc/iotmqttcerts:/etc/iotmqttcerts:ro
    networks: [wm]

  ui:
    build:
      context: ../wastemgmt_ui
      dockerfile: Dockerfile
    image: wastemgmt-ui:latest
    container_name: wastemgmt-ui
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://wastemgmt.coraltele.com
      - NEXT_PUBLIC_WS_URL=wss://wastemgmt.coraltele.com/ws
    ports:
      - "3000:3000"
    depends_on: [api]
    networks: [wm]

  nginx:
    image: nginx:1.27-alpine
    container_name: wastemgmt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [api, ui]
    networks: [wm]

  redis:
    image: redis:7-alpine
    container_name: wastemgmt-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks: [wm]

networks:
  wm:
    driver: bridge

volumes:
  redis-data:
